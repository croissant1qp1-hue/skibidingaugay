<!DOCTYPE html>
<html lang="en">
  <head>
    <title>Calculator</title>
    <style>

      p{
        margin-top: 0;
        margin-bottom: 10px;
      }
      button {
        background-color: rgb(51,51,51);
        height: 40px;
        width: 40px;
        border-radius: 60px;
        border: none;
        color: white;
        transition: all 0.15s;
        font-weight: 500;
        font-size: 16px;
        cursor: pointer;
      }

      button:hover {
        background-color: rgb(70,70,70);
      }

      button:active {
        opacity:0.8;
      }

      
      .clear-button, .backspace{
        background: #888888;
        margin-left: 47px;
      }

      .clear-button:hover, .backspace:hover {
        background-color: #b3b3b3;
      }
      .backspace {
        width: 80px;
        height: 40px;
        border: none;
        font-size: 20px;
        cursor: pointer;
        margin-left: 8px;
        padding-bottom: 4px;
        font-weight: small;
      }

      .operator{
        background-color: orange;
      }

      .operator:hover {
        background-color: rgb(255, 185, 55);
      }
     
    </style>
  </head>
  <body style="font-family:arial;font-size: 20px; color: white; background-color: black;">
    <p style="font-family: arial;" id ="calculation">calculater</p>

    <p>
      <button onclick="calculation += 1 
        console.log(calculation);updateDisplay();">
        1
      </button>
      <button onclick="calculation += 2 
        console.log(calculation);updateDisplay();">
        2
      </button>
      <button onclick="calculation += 3 
        console.log(calculation);updateDisplay();">
        3
      </button>
      <button class="operator" onclick="calculation += ' + ' 
        console.log(calculation);updateDisplay();">
      +
    </button> 
    </p>

    <p>
      <button onclick="calculation += 4 
        console.log(calculation);updateDisplay();">
        4
      </button>
      <button onclick="calculation += 5 
        console.log(calculation);updateDisplay();">
        5
      </button>
      <button onclick="calculation += 6 
        console.log(calculation);updateDisplay();">
        6
      </button>
      <button class="operator" onclick="calculation += ' - ' 
        console.log(calculation);updateDisplay();">
       -
    </button> 
    </p>

    <p>
      <button onclick="calculation += 7
        console.log(calculation);updateDisplay();">
        7
      </button>
      <button onclick="calculation += 8 
        console.log(calculation);updateDisplay();">
        8
      </button>
      <button onclick="calculation += 9 
        console.log(calculation);updateDisplay();">
        9
      </button>
      <button class="operator" onclick="calculation += ' * ' 
        console.log(calculation);updateDisplay()">
       *
    </button> 
    </p>

    <p>
      <button onclick="calculation += 0 
        console.log(calculation);updateDisplay();">
        0
      </button>
      <button class="operator" onclick="calculation += '.'
        console.log(calculation);updateDisplay();">
        .
      </button>
      <button  class="operator" onclick="calculation = eval(calculation)
        console.log(calculation);updateDisplay();">
        =
      </button>
      <button class="operator" onclick="calculation += ' / ' 
        console.log(calculation);updateDisplay();">
       /
    </button> 
    </p>

    <div style="display: flex;">
      <button class="clear-button" onclick="calculation='' 
        console.log('cleared');updateDisplay();">
        c
      </button>
      
      <button class="backspace"  onclick="calculation = calculation.substring(0, calculation.length - 1); 
        console.log(calculation);updateDisplay();
        ">
        ⌫
      </button>
    </div>
   



    <script>
      let calculation = '';
      function updateDisplay() {
         document.getElementById("calculation").textContent = calculation;
         if (calculation == '') 
          document.getElementById('calculation').textContent = 'please enter a calculation';
      }

     </script>    
  </body>
</html>
